name: Build and Deploy to Ubuntu Docker VM

on:
  push:
    branches: [ master ]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'docker-compose.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build backend
        working-directory: src/backend/SDM
        run: |
          dotnet restore SDM.slnx
          dotnet build SDM.slnx --no-restore -c Release

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: src/frontend
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" "
            set -e
            cd ~/SecureDeviceManager
            git pull origin master
            docker compose down --remove-orphans
            docker container rm -f sdm-postgres sdm-api sdm-pgadmin sdm-frontend 2>/dev/null || true
            docker compose build --no-cache api frontend
            docker compose up -d
            docker compose logs api --tail=20
            docker compose logs frontend --tail=10
          "
